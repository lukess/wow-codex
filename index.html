<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>1946 Arcade</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <canvas id="game" aria-label="1946 vertical scrolling arcade shooter"></canvas>
    <div id="touch-controls" aria-hidden="true">
      <div id="touch-stick"><span></span></div>
      <div class="touch-actions">
        <button id="touch-bomb" type="button">B</button>
        <button id="touch-fire" type="button">F</button>
      </div>
    </div>

    <script src="js/sprites.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/input.js"></script>
    <script src="js/collision.js"></script>
    <script src="js/background.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/weapons.js"></script>
    <script src="js/powerups.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/hud.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
